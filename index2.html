<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Invite</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:gg sans, "Helvetica Neue", Helvetica, Arial, sans-serif;
}

body{
    background:#1e1f22;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.invite-card{
    width:820px;
    background:#313338;
    text-align:center;
    padding:42px 30px 55px;
}

.subtitle{
    color:#dbdee1;
    font-size:30px;
    font-weight:400;
    line-height:1.2;
    margin-bottom:22px;
}

.server-name{
    color:#ffffff;
    font-size:72px;
    font-weight:700;
    line-height:1;
    margin-bottom:34px;
}

.stats{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:55px;
}

.stat{
    display:flex;
    align-items:center;
    color:#dbdee1;
    font-size:38px;
    font-weight:400;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    margin-right:14px;
    flex-shrink:0;
}

.online{
    background:#3ba55d;
}

.members{
    background:#9a9ca1;
}
</style>
</head>

<body>

<div class="invite-card">

    <div class="subtitle">
        You've been invited to join
    </div>

    <div class="server-name">
        Monad
    </div>

    <div class="stats">

        <div class="stat">
            <span class="dot online"></span>
            13,513 Online
        </div>

        <div class="stat">
            <span class="dot members"></span>
            634,884 Members
        </div>

    </div>

</div>

</body>
</html>
